<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artanat Watermarks</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* Сброс отступов и черный фон */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background-color: #000; 
            overflow: hidden; /* Скрываем полосы прокрутки */
        }

        /* Контейнер для водяных знаков */
        #watermark { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            pointer-events: none; /* Чтобы клики проходили сквозь анимацию */
            z-index: 1; 
        }
    </style>
</head>
<body>

    <div id="watermark"></div>

    <script>
        // Генерация случайного акцентного цвета из вашей палитры
        const brandColors = ['#FF0000', '#FF8000', '#FFFF00', '#00FF80', '#00D0FF', '#0000FF', '#8000FF'];
        const randomColor = brandColors[Math.floor(Math.random() * brandColors.length)];

        // ================= ВОДЯНЫЕ ЗНАКИ ================= //
        const watermarkScene = new THREE.Scene();
        const watermarkCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        watermarkCamera.position.z = 20;

        const watermarkRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        watermarkRenderer.setSize(window.innerWidth, window.innerHeight);
        watermarkRenderer.domElement.style.position = 'fixed';
        watermarkRenderer.domElement.style.top = '0';
        watermarkRenderer.domElement.style.left = '0';
        watermarkRenderer.domElement.style.zIndex = '1';
        watermarkRenderer.domElement.style.pointerEvents = 'none';
        watermarkRenderer.domElement.style.opacity = '0.5'; 
        document.getElementById('watermark').appendChild(watermarkRenderer.domElement);

        const watermarkConfig = {
            columns: 12, rows: 10, baseSize: 0.2, speed: 0.015, drift: 0.03, opacity: 0.4,
            colors: [
                new THREE.Color(randomColor),
                new THREE.Color(1.0, 1.0, 1.0),
                new THREE.Color(0.5, 0.5, 0.5)
            ]
        };

        class SeamlessWatermark {
            constructor(font) {
                this.font = font;
                this.meshes = [];
                this.initSeamlessGrid();
            }
            initSeamlessGrid() {
                const texts = ['Artanat', 'arterrii', 'Dante Sogliano', 'artanat.com'];
                const columnWidth = 80 / watermarkConfig.columns;
                const rowHeight = 60 / watermarkConfig.rows;
                for (let col = 0; col < watermarkConfig.columns; col++) {
                    for (let row = 0; row < watermarkConfig.rows * 1.5; row++) {
                        const text = texts[Math.floor(Math.random() * texts.length)];
                        this.createWatermark(text, -40 + col * columnWidth + (Math.random() - 0.5) * columnWidth * 0.8, 30 - row * rowHeight * 0.6 + (Math.random() - 0.5) * rowHeight * 0.4);
                    }
                }
            }
            createWatermark(text, x, y) {
                const size = watermarkConfig.baseSize * (0.8 + Math.random() * 0.5);
                const color = watermarkConfig.colors[Math.floor(Math.random() * watermarkConfig.colors.length)].clone();
                const geometry = new THREE.TextGeometry(text, { font: this.font, size: size, height: 0.01, curveSegments: 2 });
                const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: watermarkConfig.opacity * (0.5 + Math.random() * 0.5), blending: THREE.NormalBlending });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, y, (Math.random() - 0.5) * 15);
                mesh.userData = { speed: watermarkConfig.speed * (0.8 + Math.random() * 0.6), drift: watermarkConfig.drift * (0.5 + Math.random()), phase: Math.random() * Math.PI * 2, initialY: y };
                watermarkScene.add(mesh);
                this.meshes.push(mesh);
            }
            update(time) {
                this.meshes.forEach(mesh => {
                    const ud = mesh.userData;
                    mesh.position.y -= ud.speed;
                    mesh.position.x += Math.cos(time * 0.001 + ud.phase) * ud.drift * 0.2;
                    if (mesh.position.y < -30) {
                        mesh.position.y = 30;
                        mesh.position.x = ud.initialY + (Math.random() - 0.5) * 5;
                    }
                    mesh.material.opacity = watermarkConfig.opacity * (0.6 + Math.sin(time * 0.002 + ud.phase) * 0.4);
                });
            }
        }

        // Загрузка шрифта и запуск анимации
        new THREE.FontLoader().load('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            const watermarkSystem = new SeamlessWatermark(font);
            function animateWatermarks(currentTime) {
                requestAnimationFrame(animateWatermarks);
                watermarkSystem.update(currentTime);
                watermarkRenderer.render(watermarkScene, watermarkCamera);
            }
            animateWatermarks(0);
        });

        // Адаптация при изменении размера окна
        window.addEventListener('resize', () => {
            watermarkCamera.aspect = window.innerWidth / window.innerHeight;
            watermarkCamera.updateProjectionMatrix();
            watermarkRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
