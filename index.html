<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syolana Watermarks - Rain Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        .watermark {
            position: fixed;
            color: #ffffff;
            opacity: 0; /* Изначально скрыты для плавного появления */
            white-space: nowrap;
            /* Убрали translate(-50%, -50%), т.к. используем translate в анимации */
            pointer-events: none;
            /* Шрифт умеренно жирный, но яркий */
            font-weight: 600;
        }

        /* Единая анимация для движения и плавного появления/исчезновения */
        @keyframes moveDownAndFade {
            0% {
                /* Начинаем за верхним краем экрана (-20vh) */
                transform: translateX(-50%) translateY(-20vh);
                opacity: 0;
            }
            10% {
                /* Быстро проявляемся */
                opacity: 1;
            }
            90% {
                /* Удерживаем видимость почти до самого конца */
                opacity: 1;
            }
            100% {
                /* Уходим за нижний край экрана (120vh) */
                transform: translateX(-50%) translateY(120vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<script>
    const words = ["Syolana", "syolanacom", "Yolana", "syolana.com", "SY"];

    // Настройки сетки по горизонтали (столбцы) для предотвращения наложений
    const cols = 15; // Сколько водяных знаков может быть на экране одновременно по ширине
    const columnOccupied = Array(cols).fill(false); // Массив занятости столбцов
    let currentColumn = 0; // Текущий столбец для последовательного заполнения

    function getRandom(min, max) {
        return Math.random() * (max - min) + min;
    }

    function spawnWatermark() {
        // Проверяем, свободен ли следующий столбец
        if(columnOccupied[currentColumn]) {
            // Если занят, пропускаем цикл и переходим к следующему столбцу (чтобы не было наслоений в одном столбце)
            currentColumn = (currentColumn + 1) % cols;
            return;
        }

        // Занимаем столбец
        columnOccupied[currentColumn] = true;
        const colIndex = currentColumn; // Запоминаем индекс столбца для этого элемента

        const el = document.createElement('div');
        el.className = 'watermark';
        el.innerText = words[Math.floor(Math.random() * words.length)];

        // Умеренный размер шрифта (от 1.2 до 1.8 rem), чтобы не был слишком огромным
        const size = getRandom(1.2, 1.8);
        el.style.fontSize = size + 'rem';
        el.style.fontWeight = Math.random() > 0.5 ? '600' : '400';

        // Вычисляем координаты: центр столбца по горизонтали
        const cellWidth = 100 / cols;
        const left = (colIndex * cellWidth) + (cellWidth / 2);
        
        el.style.left = left + 'vw';
        el.style.top = '-10vh'; // Позиция за экраном перед началом анимации

        // Случайная длительность анимации (скорость) для создания глубины (от 18 до 28 секунд)
        // Это профессионально: разные слова двигаются с разной скоростью.
        const duration = getRandom(18, 28);
        el.style.animation = 'moveDownAndFade ' + duration + 's linear'; // linear - равномерное движение

        document.body.appendChild(el);

        // Переходим к следующему столбцу для следующего водяного знака
        currentColumn = (currentColumn + 1) % cols;

        // Освобождаем столбец и удаляем элемент только тогда, когда анимация закончилась
        el.addEventListener('animationend', () => {
            columnOccupied[colIndex] = false; // Освобождаем зону для новых слов
            el.remove();
        });
    }

    // Первичный запуск: плавно заполняем экран с первой секунды (около 25 слов)
    for(let i = 0; i < 25; i++) {
        setTimeout(spawnWatermark, getRandom(0, 10000)); // Генерируем их в течение 10 секунд
    }

    // Бесконечный цикл: каждые 600 мс рождается новое слово (если есть свободный столбец)
    setInterval(spawnWatermark, 600);

</script>
</body>
</html>
