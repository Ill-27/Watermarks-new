<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syolana Watermarks - Pro Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        .watermark {
            position: absolute;
            color: #ffffff;
            opacity: 0; /* Изначально скрыты */
            transition: opacity 3s ease-in-out; /* Очень плавное появление (3 секунды) */
            pointer-events: none;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            /* Убрали свечение, чтобы текст был более плоским и "водяным" */
        }
    </style>
</head>
<body>

<script>
    const words = ["Syolana", "syolanacom", "Yolana", "syolana.com", "SY"];

    // Настройки сетки для предотвращения наложений
    const rows = 8;
    const cols = 8;
    // Создаем матрицу занятости ячеек (false = свободно, true = занято)
    const grid = Array(rows).fill(null).map(() => Array(cols).fill(false));

    function getRandom(min, max) {
        return Math.random() * (max - min) + min;
    }

    function spawnWatermark() {
        // 1. Ищем все свободные ячейки на экране
        let emptyCells = [];
        for(let r = 0; r < rows; r++) {
            for(let c = 0; c < cols; c++) {
                if(!grid[r][c]) emptyCells.push({r, c});
            }
        }

        // Если свободных мест нет, ждем следующего цикла (защита от переполнения)
        if(emptyCells.length === 0) return;

        // 2. Выбираем случайную свободную ячейку и занимаем её
        let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        grid[cell.r][cell.c] = true;

        const el = document.createElement('div');
        el.className = 'watermark';
        el.innerText = words[Math.floor(Math.random() * words.length)];

        // Меньший размер шрифта (от 0.8 до 1.5 rem)
        const size = getRandom(0.8, 1.5);
        el.style.fontSize = size + 'rem';
        el.style.fontWeight = Math.random() > 0.5 ? '600' : '400'; // Убрали слишком жирный шрифт

        // Вычисляем координаты центра выбранной ячейки
        const cellWidth = 100 / cols;
        const cellHeight = 100 / rows;
        
        // Добавляем небольшое случайное смещение внутри ячейки, чтобы не выглядело как строгая таблица
        const offsetX = getRandom(-cellWidth * 0.2, cellWidth * 0.2);
        const offsetY = getRandom(-cellHeight * 0.2, cellHeight * 0.2);

        el.style.left = (cell.c * cellWidth + (cellWidth / 2) + offsetX) + 'vw';
        el.style.top = (cell.r * cellHeight + (cellHeight / 2) + offsetY) + 'vh';

        document.body.appendChild(el);

        // Только полупрозрачные (от 3% до 12% видимости)
        const targetOpacity = getRandom(0.03, 0.12);
        const stayDuration = getRandom(3000, 6000); // Время удержания

        // Плавное появление
        setTimeout(() => {
            el.style.opacity = targetOpacity;
        }, 50);

        // Плавное исчезновение
        setTimeout(() => {
            el.style.opacity = 0;
        }, stayDuration + 3000);

        // Удаление элемента и освобождение ячейки для новых слов
        setTimeout(() => {
            grid[cell.r][cell.c] = false; // Снова делаем зону свободной
            el.remove();
        }, stayDuration + 6000); 
    }

    // Первичный запуск: заполняем часть экрана сразу (около 15 слов)
    for(let i = 0; i < 15; i++) {
        setTimeout(spawnWatermark, getRandom(0, 2000));
    }

    // Рождаем новое слово каждые 400 мс (меньшая плотность, чем раньше)
    setInterval(spawnWatermark, 400);

</script>
</body>
</html>
